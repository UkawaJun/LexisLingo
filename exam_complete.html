<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>章节完成</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
    background: #f0f7ff;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }

  .card {
    background: #ffffff;
    border-radius: 24px;
    padding: 40px 36px 36px;
    width: 580px;
    text-align: center;
    position: relative;
    box-shadow: 0 8px 40px rgba(26, 107, 154, 0.12);
    border: 1.5px solid #d0e8f5;
  }

  .badge-wrap { position: relative; margin-bottom: 20px; }

  .badge-circle {
    width: 88px; height: 88px;
    border-radius: 50%;
    background: linear-gradient(135deg, #1a6b9a 0%, #0984e3 100%);
    margin: 0 auto;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }

  .badge-circle svg {
    width: 48px; height: 48px;
    animation: starSpin 6s ease-in-out infinite;
  }

  @keyframes starSpin {
    0%, 100% { transform: scale(1) rotate(0deg); }
    50% { transform: scale(1.1) rotate(15deg); }
  }

  .badge-ring {
    position: absolute; inset: -8px;
    border-radius: 50%;
    border: 2px dashed rgba(9, 132, 227, 0.3);
    animation: spin 12s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .particles { position: absolute; top:0;left:0;right:0;bottom:0; pointer-events:none; }
  .dot { position: absolute; border-radius: 50%; animation: float 3s ease-in-out infinite; }

  @keyframes float {
    0%,100% { transform: translateY(0) scale(1); opacity:0.7; }
    50% { transform: translateY(-10px) scale(1.2); opacity:1; }
  }

  h1 { font-size: 32px; font-weight: 700; color: #1a3a52; margin-bottom: 8px; }

  .subtitle { font-size: 14px; color: #7f8c8d; margin-bottom: 20px; line-height: 1.6; }

  .chapter-tag {
    display: inline-block;
    background: #e8f4fd; color: #1a6b9a;
    border-radius: 20px; padding: 5px 18px;
    font-size: 13px; font-weight: 500;
    margin-bottom: 20px; border: 1px solid #b8d9f0;
  }

  .stats {
    display: grid; grid-template-columns: repeat(2, 1fr);
    gap: 10px; margin-bottom: 20px;
  }

  .stat-box {
    background: #f0f7ff; border-radius: 12px;
    padding: 14px 8px; border: 1px solid #d0e8f5;
  }

  .stat-val { font-size: 30px; font-weight: 700; color: #1a6b9a; display: block; }
  .stat-label { font-size: 11px; color: #95a5a6; margin-top: 3px; display: block; }

  /* 单词标签区 */
  .words-section { margin-bottom: 20px; text-align: left; }

  .words-title {
    font-size: 12px; color: #95a5a6;
    margin-bottom: 8px; padding-left: 2px;
  }

  .words-row {
    display: flex; flex-wrap: wrap; gap: 6px;
  }

  .word-tag {
    border-radius: 8px; padding: 4px 12px;
    font-size: 13px; font-weight: 500;
  }

  .word-tag.wrong {
    background: #FCEBEB; color: #c0392b;
    border: 1px solid #f5d0d0;
  }

  .word-tag.correct {
    background: #E1F5EE; color: #0F6E56;
    border: 1px solid #9FE1CB;
  }

  .progress-wrap { margin-bottom: 20px; }

  .progress-label {
    display: flex; justify-content: space-between;
    font-size: 12px; color: #7f8c8d; margin-bottom: 6px;
  }

  .progress-bar { height: 7px; background: #e0eef8; border-radius: 4px; overflow: hidden; }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #0984e3, #1a6b9a);
    border-radius: 4px;
    transition: width 1.2s cubic-bezier(0.4,0,0.2,1);
    width: 0%;
  }

  .btn {
    width: 100%; height: 48px; border-radius: 12px;
    border: none; font-size: 15px; font-weight: 600;
    font-family: 'Microsoft YaHei', sans-serif;
    cursor: pointer; transition: transform 0.15s, box-shadow 0.15s;
    display: block;
  }

  .btn-primary {
    background: linear-gradient(135deg, #1a6b9a, #0984e3);
    color: white; box-shadow: 0 4px 16px rgba(9,132,227,0.3);
    margin-bottom: 8px;
  }

  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(9,132,227,0.4); }

  .btn-save {
    background: #e8f4fd; color: #1a6b9a;
    border: 1px solid #b8d9f0; font-size: 13px;
  }

  .btn-save:hover { background: #d0e8f5; transform: translateY(-1px); }

  @keyframes fadeUp {
    from { opacity:0; transform:translateY(24px); }
    to   { opacity:1; transform:translateY(0); }
  }

  .card { animation: fadeUp 0.5s ease both; }
</style>
</head>
<body>

<div class="card" id="save-target">
  <div class="particles">
    <div class="dot" style="width:8px;height:8px;background:#0984e3;top:10%;left:6%;animation-delay:0s;opacity:0.4;"></div>
    <div class="dot" style="width:6px;height:6px;background:#1a6b9a;top:18%;right:8%;animation-delay:0.8s;opacity:0.3;"></div>
    <div class="dot" style="width:9px;height:9px;background:#74b9ff;top:65%;left:4%;animation-delay:1.4s;opacity:0.3;"></div>
    <div class="dot" style="width:5px;height:5px;background:#0984e3;bottom:12%;right:6%;animation-delay:0.4s;opacity:0.4;"></div>
  </div>

  <div class="badge-wrap">
    <div class="badge-circle">
      <div class="badge-ring"></div>
      <svg viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M26 4L31.5 18H47L35 27.5L39.5 42L26 33L12.5 42L17 27.5L5 18H20.5L26 4Z"
              fill="rgba(255,255,255,0.9)" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
      </svg>
    </div>
  </div>

  <h1>考核完成</h1>
  <p class="subtitle" id="subtitle-text">恭喜你完成本次章节考核！</p>

  <div class="chapter-tag" id="chapter-name">章节</div>

  <div class="stats">
    <div class="stat-box">
      <span class="stat-val" id="val-words">—</span>
      <span class="stat-label">本章单词数</span>
    </div>
    <div class="stat-box">
      <span class="stat-val" id="val-correct">—</span>
      <span class="stat-label">本次答对</span>
    </div>
    <div class="stat-box">
      <span class="stat-val" id="val-time">—</span>
      <span class="stat-label">用时</span>
    </div>
    <div class="stat-box">
      <span class="stat-val" id="val-date">—</span>
      <span class="stat-label">完成时间</span>
    </div>
  </div>

  <!-- 错词 -->
  <div class="words-section" id="wrong-section" style="display:none;">
    <div class="words-title">需要加强</div>
    <div class="words-row" id="wrong-words"></div>
  </div>

  <!-- 对词 -->
  <div class="words-section" id="correct-section" style="display:none;">
    <div class="words-title">掌握良好</div>
    <div class="words-row" id="correct-words"></div>
  </div>

  <div class="progress-wrap">
    <div class="progress-label">
      <span>本次完成度</span>
      <span id="prog-pct">—%</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="prog-fill"></div>
    </div>
  </div>

  <button class="btn btn-primary" onclick="window.close()">关闭继续学习</button>
  <button class="btn btn-save" onclick="saveImg()">保存成就图片</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
  const params        = new URLSearchParams(window.location.search);
  const words         = params.get('words')         || '—';
  const correct_count = params.get('correct_count') || '—';
  const mins          = params.get('mins')          || '—';
  const chapter       = params.get('chapter')       || '本章节';
  const wrongStr      = params.get('wrong')         || '';
  const correctStr    = params.get('correct')       || '';

  document.getElementById('val-words').textContent   = words;
  const score_html = params.get('score_html') || correct_count;
  document.getElementById('val-correct').innerHTML = decodeURIComponent(score_html);
  document.getElementById('val-time').textContent    = mins + ' 分钟';
  document.getElementById('chapter-name').textContent = chapter;

  const now = new Date();
  document.getElementById('val-date').textContent =
    `${now.getMonth()+1}/${now.getDate()} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;

  // 错词
  if (wrongStr) {
    const wrongList = wrongStr.split('|').filter(Boolean);
    if (wrongList.length > 0) {
      const container = document.getElementById('wrong-words');
      wrongList.slice(0, 8).forEach(w => {
        const tag = document.createElement('span');
        tag.className = 'word-tag wrong';
        tag.textContent = w;
        container.appendChild(tag);
      });
      document.getElementById('wrong-section').style.display = 'block';
    }
  }

  // 对词
  if (correctStr) {
    const correctList = correctStr.split('|').filter(Boolean);
    if (correctList.length > 0) {
      const container = document.getElementById('correct-words');
      correctList.slice(0, 8).forEach(w => {
        const tag = document.createElement('span');
        tag.className = 'word-tag correct';
        tag.textContent = w;
        container.appendChild(tag);
      });
      document.getElementById('correct-section').style.display = 'block';
    }
  }

  // 进度条
  const total = parseInt(words) || 0;
  const corr  = parseInt(correct_count) || 0;
  const pct   = parseInt(params.get('pct') || '0');
  document.getElementById('prog-pct').textContent = pct + '%';

  // 通关提示
  if (pct === 100) {
    document.getElementById('subtitle-text').textContent = '完美！本章节全部单词掌握！🎉';
  } else if (pct >= 80) {
    document.getElementById('subtitle-text').textContent = '非常棒！继续保持！';
  }

  setTimeout(() => {
    document.getElementById('prog-fill').style.width = pct + '%';
  }, 300);

  function saveImg() {
    document.title = '__SAVE__';
    setTimeout(() => { document.title = '章节完成'; }, 500);
  }


</script>

</body>
</html>
